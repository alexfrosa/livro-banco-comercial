  description: "Institui a Infraestrutura de Chaves Públicas Brasileira (ICP-Brasil) e estabelece a validade jurídica dos documentos eletrônicos assinados digitalmente. Fundamenta a validade legal de contratos bancários assinados eletronicamente."
